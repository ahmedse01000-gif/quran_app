workflows:
  android-release:
    name: Android Release Build
    instance_type: mac_mini_m1
    max_build_duration: 120
    environment:
      java: default
      ndk: r21e
      android_sdk: default
      xcode: default
      flutter: stable
      vars:
        JAVA_OPTS: "-Xmx3g"
    triggering:
      events:
        - push
        - tag
      branch:
        patterns:
          - pattern: main
            include: true
          - pattern: develop
            include: true
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Build APK
        script: |
          flutter build apk \
            --release \
            --build-number=$BUILD_NUMBER
      - name: Build AAB (App Bundle)
        script: |
          flutter build appbundle \
            --release \
            --build-number=$BUILD_NUMBER
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/release/*.aab
    publishing:
      email:
        recipients:
          - $DEVELOPER_EMAIL
        notify:
          success: true
          failure: true
      slack:
        channel: '#builds'
        notify_on_build_start: true
        notify:
          success: true
          failure: true

  android-debug:
    name: Android Debug Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      java: default
      ndk: r21e
      android_sdk: default
      xcode: default
      flutter: stable
    triggering:
      events:
        - pull_request
      branch:
        patterns:
          - pattern: develop
            include: true
          - pattern: feature/*
            include: true
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Run tests
        script: |
          flutter test
      - name: Build APK Debug
        script: |
          flutter build apk \
            --debug \
            --build-number=$BUILD_NUMBER
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - $DEVELOPER_EMAIL
        notify:
          success: true
          failure: true
